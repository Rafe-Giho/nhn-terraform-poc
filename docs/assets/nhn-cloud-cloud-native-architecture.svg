  <text class="section" x="68" y="142">External</text>
  <rect class="box" x="82" y="170" width="180" height="38" rx="7"/>
  <text class="label" x="130" y="194">Users</text>
  <rect class="box" x="82" y="225" width="180" height="38" rx="7"/>
  <text class="label" x="126" y="249">DNS Zone</text>
  <rect class="box" x="82" y="280" width="180" height="38" rx="7"/>
  <text class="label" x="117" y="304">Git Repository</text>
  <rect class="box" x="82" y="335" width="180" height="38" rx="7"/>
  <text class="label" x="112" y="359">Container Registry</text>

