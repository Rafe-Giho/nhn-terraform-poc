  <text class="title" x="42" y="48">NHN Cloud 클라우드 네이티브 표준 아키텍처</text>
  <text class="subtitle" x="42" y="73">NKS 기반 서비스 플랫폼을 foundation stack과 Kubernetes platform stack으로 분리해 관리한다.</text>

