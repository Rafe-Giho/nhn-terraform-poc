  <text class="label" x="462" y="691">GitLab/Gitea</text>
  <rect class="box" x="620" y="665" width="145" height="42" rx="8"/>
  <text class="label" x="654" y="691">Jenkins</text>
  <rect class="box" x="800" y="665" width="150" height="42" rx="8"/>
  <text class="label" x="836" y="691">Argo CD</text>
  <rect class="box" x="430" y="720" width="155" height="34" rx="8"/>
  <text class="label" x="457" y="742">CI Runner/Agent</text>
  <rect class="box" x="620" y="720" width="145" height="34" rx="8"/>
  <text class="label" x="650" y="742">cert-manager</text>
  <rect class="box" x="800" y="720" width="150" height="34" rx="8"/>
  <text class="label" x="828" y="742">Observability</text>

