  <rect class="external" x="345" y="885" width="1170" height="55" rx="10"/>
  <text class="section" x="375" y="909">Terraform Stack Boundary</text>
  <text class="small" x="375" y="929">foundation: VPC, routing tables, subnet mapping, explicit SG ingress/egress, Object Storage, DevOps VM, NKS / platform: namespace, StorageClass, Helm add-on</text>

