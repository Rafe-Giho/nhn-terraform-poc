<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">NHN Cloud IaaS 3-tier 표준 아키텍처</title>
  <desc id="desc">VM 기반 Web, WAS, DB 3-tier와 모니터링, 로그, 백업, 보안 솔루션 서버를 포함한 전환형 표준 아키텍처</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#25384f"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .project { fill: #ffffff; stroke: #93a2b7; stroke-width: 2; }
      .external { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .dmz { fill: #eef7ff; stroke: #5b94c8; stroke-width: 1.7; }
      .app { fill: #f1f8f4; stroke: #5f9b76; stroke-width: 1.7; }
      .data { fill: #fff8e8; stroke: #d6a84f; stroke-width: 1.7; }
      .ops { fill: #f5f0ff; stroke: #9274c8; stroke-width: 1.7; }
      .manual { fill: #fff1f2; stroke: #dc7580; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #42566d; stroke-width: 1.4; }
      .title { font: 700 27px Arial, "Malgun Gothic", sans-serif; fill: #0f172a; }
      .subtitle { font: 13px Arial, "Malgun Gothic", sans-serif; fill: #475569; }
      .section { font: 700 17px Arial, "Malgun Gothic", sans-serif; fill: #1e293b; }
      .label { font: 600 13px Arial, "Malgun Gothic", sans-serif; fill: #1e293b; }
      .small { font: 12px Arial, "Malgun Gothic", sans-serif; fill: #526173; }
      .tiny { font: 11px Arial, "Malgun Gothic", sans-serif; fill: #64748b; }
      .line { stroke: #25384f; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text class="title" x="42" y="48">NHN Cloud IaaS 3-tier 표준 아키텍처</text>
  <text class="subtitle" x="42" y="73">기존 업무시스템을 VM 기반 3-tier로 전환하고, 관리망에 운영 솔루션 서버를 분리 배치한다.</text>

  <rect class="external" x="42" y="110" width="250" height="250" rx="12"/>
  <text class="section" x="68" y="142">External / 고객망</text>
  <rect class="box" x="78" y="170" width="176" height="38" rx="7"/>
  <text class="label" x="126" y="194">Users</text>
  <rect class="box" x="78" y="225" width="176" height="38" rx="7"/>
  <text class="label" x="122" y="249">DNS / GSLB</text>
  <rect class="manual" x="78" y="280" width="176" height="38" rx="7"/>
  <text class="label" x="105" y="304">VPN / 전용회선</text>

  <rect class="external" x="42" y="400" width="250" height="325" rx="12"/>
  <text class="section" x="68" y="432">운영자 접근</text>
  <rect class="box" x="78" y="460" width="176" height="38" rx="7"/>
  <text class="label" x="110" y="484">Admin Network</text>
  <rect class="box" x="78" y="515" width="176" height="38" rx="7"/>
  <text class="label" x="115" y="539">접근통제</text>
  <rect class="manual" x="78" y="570" width="176" height="38" rx="7"/>
  <text class="label" x="112" y="594">보안관제 연동</text>
  <text class="tiny" x="78" y="650">보안 기준에 따라</text>
  <text class="tiny" x="78" y="670">망 연계, 접속 승인, 감사</text>
  <text class="tiny" x="78" y="690">로그 보존 정책을 확정</text>

  <rect class="project" x="335" y="110" width="1220" height="760" rx="14"/>
  <text class="section" x="365" y="142">NHN Cloud Project / VPC - public/private/management routing table</text>

  <rect class="dmz" x="375" y="175" width="1140" height="135" rx="11"/>
  <text class="section" x="405" y="207">Public / DMZ Subnet - public routing table</text>
  <rect class="box" x="420" y="235" width="150" height="44" rx="8"/>
  <text class="label" x="454" y="262">Floating IP</text>
  <rect class="box" x="610" y="235" width="160" height="44" rx="8"/>
  <text class="label" x="657" y="262">Public LB</text>
  <rect class="manual" x="810" y="235" width="160" height="44" rx="8"/>
  <text class="label" x="854" y="262">WAF / IPS</text>
  <rect class="box" x="1010" y="225" width="200" height="64" rx="8"/>
  <text class="label" x="1064" y="252">Reverse Proxy</text>
  <text class="tiny" x="1048" y="272">optional, public entry only</text>
  <rect class="box" x="1260" y="225" width="180" height="64" rx="8"/>
  <text class="label" x="1313" y="252">DMZ SG</text>
  <text class="tiny" x="1298" y="272">public entry only</text>

  <rect class="app" x="375" y="345" width="1140" height="150" rx="11"/>
  <text class="section" x="405" y="377">Private Web / Application Subnets - private routing table</text>
  <rect class="box" x="440" y="405" width="180" height="58" rx="8"/>
  <text class="label" x="492" y="430">Web 01..N</text>
  <text class="tiny" x="473" y="450">nginx, apache, proxy</text>
  <rect class="box" x="675" y="405" width="215" height="58" rx="8"/>
  <text class="label" x="727" y="430">Internal LB</text>
  <text class="tiny" x="730" y="450">optional, private</text>
  <rect class="box" x="945" y="405" width="180" height="58" rx="8"/>
  <text class="label" x="990" y="430">WAS 01..N</text>
  <text class="tiny" x="980" y="450">tomcat, middleware</text>
  <rect class="box" x="1180" y="405" width="210" height="58" rx="8"/>
  <text class="label" x="1228" y="430">Internal/WAS SG</text>
  <text class="tiny" x="1208" y="450">Web -> Internal LB -> WAS</text>

  <rect class="data" x="375" y="530" width="1140" height="145" rx="11"/>
  <text class="section" x="405" y="562">Private Data Subnet - private routing table</text>
  <rect class="box" x="440" y="590" width="175" height="52" rx="8"/>
  <text class="label" x="488" y="615">DB 01</text>
  <text class="tiny" x="470" y="635">primary, VM DB</text>
  <rect class="box" x="660" y="590" width="175" height="52" rx="8"/>
  <text class="label" x="706" y="615">DB 02</text>
  <text class="tiny" x="690" y="635">standby option</text>
  <rect class="box" x="885" y="590" width="170" height="52" rx="8"/>
  <text class="label" x="928" y="615">DB Volume</text>
  <text class="tiny" x="922" y="635">block storage</text>
  <rect class="box" x="1105" y="590" width="165" height="52" rx="8"/>
  <text class="label" x="1155" y="615">NAS</text>
  <text class="tiny" x="1132" y="635">shared files</text>
  <rect class="box" x="1315" y="590" width="140" height="52" rx="8"/>
  <text class="label" x="1357" y="615">DB SG</text>
  <text class="tiny" x="1340" y="635">from WAS only</text>

  <rect class="ops" x="375" y="710" width="1140" height="115" rx="11"/>
  <text class="section" x="405" y="742">Management / Operations Subnets - management routing table</text>
  <rect class="box" x="420" y="765" width="120" height="38" rx="8"/>
  <text class="label" x="454" y="789">Bastion</text>
  <rect class="box" x="575" y="765" width="155" height="38" rx="8"/>
  <text class="label" x="612" y="789">Deploy Repo</text>
  <rect class="box" x="765" y="765" width="145" height="38" rx="8"/>
  <text class="label" x="804" y="789">Monitoring</text>
  <rect class="box" x="945" y="765" width="130" height="38" rx="8"/>
  <text class="label" x="990" y="789">Log</text>
  <rect class="box" x="1110" y="765" width="130" height="38" rx="8"/>
  <text class="label" x="1150" y="789">Backup</text>
  <rect class="manual" x="1275" y="765" width="170" height="38" rx="8"/>
  <text class="label" x="1310" y="789">Security Agents</text>

  <rect class="external" x="1165" y="885" width="350" height="55" rx="10"/>
  <text class="section" x="1190" y="909">Shared Repository</text>
  <text class="small" x="1190" y="929">Object Storage: backup, logs, artifacts, install files</text>

  <path class="line" d="M254 244 C340 244, 345 257, 420 257"/>
  <path class="line" d="M570 257 L610 257"/>
  <path class="line" d="M770 257 L810 257"/>
  <path class="line" d="M970 257 L1010 257"/>
  <path class="line" d="M1110 289 C1110 332, 530 350, 530 405"/>
  <path class="line" d="M620 434 L675 434"/>
  <path class="line" d="M890 434 L945 434"/>
  <path class="line" d="M1035 463 C1035 530, 527 535, 527 590"/>
  <path class="line" d="M1035 463 C1035 532, 748 535, 748 590"/>
  <path class="dash" d="M254 480 C335 480, 345 784, 420 784"/>
  <path class="dash" d="M838 765 C838 690, 1050 658, 970 642"/>
  <path class="dash" d="M1175 803 C1175 850, 1280 870, 1280 885"/>
  <path class="dash" d="M1010 803 C1010 860, 1310 865, 1310 885"/>

  <rect class="manual" x="42" y="760" width="250" height="125" rx="12"/>
  <text class="section" x="68" y="792">Console / 별도 확정</text>
  <text class="small" x="78" y="820">NACL, Flow Log</text>
  <text class="small" x="78" y="842">NAT, Service Gateway</text>
  <text class="small" x="78" y="864">WAF, VPN, Transit</text>
  <text class="small" x="78" y="886">DB HA, 백업, 감사 정책</text>

  <rect class="external" x="335" y="885" width="780" height="55" rx="10"/>
  <text class="section" x="365" y="909">Terraform 우선 범위</text>
  <text class="small" x="365" y="929">VPC, routing tables, subnet mapping, explicit SG ingress/egress, instance, volume, load balancer, object storage, NAS</text>
</svg>
