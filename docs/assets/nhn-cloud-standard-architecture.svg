<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">NHN Cloud 표준 아키텍처 비교도</title>
  <desc id="desc">IaaS 3-tier 전환과 클라우드 네이티브 전환 표준 아키텍처를 비교한 그림</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24364b"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .card { fill: #ffffff; stroke: #92a1b5; stroke-width: 2; }
      .iaas { fill: #eef7ff; stroke: #5b94c8; stroke-width: 1.7; }
      .native { fill: #f1f8f4; stroke: #5f9b76; stroke-width: 1.7; }
      .ops { fill: #fff8e8; stroke: #d6a84f; stroke-width: 1.5; }
      .manual { fill: #fff1f2; stroke: #dc7580; stroke-width: 1.4; }
      .box { fill: #ffffff; stroke: #42566d; stroke-width: 1.4; }
      .title { font: 700 26px Arial, "Malgun Gothic", sans-serif; fill: #0f172a; }
      .subtitle { font: 13px Arial, "Malgun Gothic", sans-serif; fill: #475569; }
      .h1 { font: 700 20px Arial, "Malgun Gothic", sans-serif; fill: #172033; }
      .h2 { font: 700 15px Arial, "Malgun Gothic", sans-serif; fill: #1f2f43; }
      .label { font: 600 13px Arial, "Malgun Gothic", sans-serif; fill: #1f2f43; }
      .small { font: 12px Arial, "Malgun Gothic", sans-serif; fill: #526173; }
      .tiny { font: 11px Arial, "Malgun Gothic", sans-serif; fill: #64748b; }
      .line { stroke: #24364b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>
  <text class="title" x="42" y="48">NHN Cloud 표준 아키텍처 비교도</text>
  <text class="subtitle" x="42" y="72">두 표준 모두 VPC 1개에 public/private/management routing table과 역할별 subnet을 분리한다.</text>

  <rect class="card" x="42" y="105" width="650" height="665" rx="14"/>
  <text class="h1" x="72" y="142">IaaS 3-tier 전환</text>
  <text class="subtitle" x="72" y="166">기존 업무시스템을 VM 기반 Web/WAS/DB와 운영 솔루션 서버로 이전</text>

  <rect class="iaas" x="72" y="195" width="590" height="105" rx="10"/>
  <text class="h2" x="96" y="224">Public / DMZ - public RT</text>
  <rect class="box" x="96" y="245" width="130" height="36" rx="7"/>
  <text class="label" x="130" y="268">Public LB</text>
  <rect class="box" x="258" y="245" width="130" height="36" rx="7"/>
  <text class="label" x="300" y="268">WAF</text>
  <rect class="box" x="420" y="245" width="170" height="36" rx="7"/>
  <text class="label" x="465" y="268">Web Servers</text>

  <rect class="iaas" x="72" y="325" width="590" height="105" rx="10"/>
  <text class="h2" x="96" y="354">Private Web / Application - private RT</text>
  <rect class="box" x="112" y="375" width="160" height="36" rx="7"/>
  <text class="label" x="155" y="398">WAS Servers</text>
  <rect class="box" x="312" y="375" width="160" height="36" rx="7"/>
  <text class="label" x="357" y="398">Batch Jobs</text>

  <rect class="iaas" x="72" y="455" width="590" height="105" rx="10"/>
  <text class="h2" x="96" y="484">Data - private RT</text>
  <rect class="box" x="112" y="505" width="150" height="36" rx="7"/>
  <text class="label" x="152" y="528">DB Servers</text>
  <rect class="box" x="302" y="505" width="130" height="36" rx="7"/>
  <text class="label" x="330" y="528">Volumes</text>
  <rect class="box" x="472" y="505" width="130" height="36" rx="7"/>
  <text class="label" x="515" y="528">NAS</text>

  <rect class="ops" x="72" y="585" width="590" height="130" rx="10"/>
  <text class="h2" x="96" y="614">Management / Operations - management RT</text>
  <rect class="box" x="96" y="635" width="120" height="36" rx="7"/>
  <text class="label" x="130" y="658">Bastion</text>
  <rect class="box" x="240" y="635" width="140" height="36" rx="7"/>
  <text class="label" x="279" y="658">Monitoring</text>
  <rect class="box" x="404" y="635" width="115" height="36" rx="7"/>
  <text class="label" x="443" y="658">Log</text>
  <rect class="box" x="543" y="635" width="95" height="36" rx="7"/>
  <text class="label" x="570" y="658">Backup</text>
  <text class="tiny" x="96" y="696">보안 솔루션, 백신/EDR, 취약점 점검, 패치 저장소는 관리망/운영망에 분리 배치</text>

  <path class="line" d="M226 263 L258 263"/>
  <path class="line" d="M388 263 L420 263"/>
  <path class="line" d="M505 281 C505 320, 192 330, 192 375"/>
  <path class="line" d="M192 411 C192 452, 187 467, 187 505"/>
  <path class="dash" d="M300 653 C260 600, 260 430, 420 393"/>
  <path class="dash" d="M462 653 C450 598, 367 568, 367 541"/>

  <rect class="card" x="748" y="105" width="650" height="665" rx="14"/>
  <text class="h1" x="778" y="142">클라우드 네이티브 전환</text>
  <text class="subtitle" x="778" y="166">NKS, GitOps, CI/CD, DevOps 연동 서버, Object Storage 중심의 컨테이너 플랫폼</text>

  <rect class="native" x="778" y="195" width="590" height="105" rx="10"/>
  <text class="h2" x="802" y="224">Public Entry - public RT</text>
  <rect class="box" x="820" y="245" width="130" height="36" rx="7"/>
  <text class="label" x="858" y="268">DNS</text>
  <rect class="box" x="982" y="245" width="150" height="36" rx="7"/>
  <text class="label" x="1023" y="268">TLS / LB</text>
  <rect class="box" x="1164" y="245" width="160" height="36" rx="7"/>
  <text class="label" x="1206" y="268">Ingress</text>

  <rect class="native" x="778" y="325" width="590" height="145" rx="10"/>
  <text class="h2" x="802" y="354">NKS Service Platform - private RT</text>
  <rect class="box" x="810" y="380" width="145" height="42" rx="7"/>
  <text class="label" x="843" y="405">Node Groups</text>
  <rect class="box" x="985" y="380" width="145" height="42" rx="7"/>
  <text class="label" x="1020" y="405">Namespaces</text>
  <rect class="box" x="1160" y="380" width="150" height="42" rx="7"/>
  <text class="label" x="1190" y="405">Workloads</text>
  <rect class="box" x="895" y="430" width="150" height="26" rx="6"/>
  <text class="tiny" x="930" y="448">web, api, batch</text>

  <rect class="ops" x="778" y="495" width="590" height="105" rx="10"/>
  <text class="h2" x="802" y="524">DevOps Integration / Add-ons</text>
  <rect class="box" x="810" y="545" width="125" height="36" rx="7"/>
  <text class="label" x="832" y="568">GitLab/Gitea</text>
  <rect class="box" x="960" y="545" width="105" height="36" rx="7"/>
  <text class="label" x="980" y="568">Jenkins</text>
  <rect class="box" x="1090" y="545" width="105" height="36" rx="7"/>
  <text class="label" x="1120" y="568">Argo CD</text>
  <rect class="box" x="1220" y="545" width="125" height="36" rx="7"/>
  <text class="label" x="1242" y="568">CI Runner</text>

  <rect class="native" x="778" y="625" width="590" height="90" rx="10"/>
  <text class="h2" x="802" y="654">Storage / Data</text>
  <rect class="box" x="820" y="674" width="145" height="30" rx="7"/>
  <text class="label" x="851" y="695">Object Storage</text>
  <rect class="box" x="1000" y="674" width="120" height="30" rx="7"/>
  <text class="label" x="1032" y="695">Cinder PV</text>
  <rect class="manual" x="1155" y="674" width="150" height="30" rx="7"/>
  <text class="label" x="1195" y="695">Managed DB</text>

  <path class="line" d="M950 263 L982 263"/>
  <path class="line" d="M1132 263 L1164 263"/>
  <path class="line" d="M1244 281 C1244 322, 1235 342, 1235 380"/>
  <path class="line" d="M1235 422 C1210 492, 875 490, 868 545"/>
  <path class="dash" d="M1015 563 C1000 610, 892 640, 892 674"/>
  <path class="dash" d="M1170 563 C1190 610, 1230 640, 1230 674"/>

  <rect class="manual" x="42" y="800" width="1356" height="54" rx="10"/>
  <text class="h2" x="72" y="823">공통 선행 확인</text>
  <text class="small" x="72" y="846">API endpoint, tenant/project, region, keypair, image/flavor, external network/subnet, quota, DNS/TLS, NACL/Flow Log/NAT/Service Gateway, remote state 저장소</text>
</svg>
